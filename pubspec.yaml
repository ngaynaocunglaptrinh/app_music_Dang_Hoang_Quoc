name: appmusic
description: "Simple Offline Music Player"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.4
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  on_audio_query: ^2.9.0
  audio_session: ^0.2.2
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/sample_songs/
